<html>

<head>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <div class="container">
        <div>
            <h3>HOME</h3>
            <div class="display-el">
                <span id="home-score">0</span>
            </div>
            <div class="buttons">
                <button class="add1Home" onclick="add1Home()">+1</button>
                <button class="add2Home" onclick="add2Home()">+2</button>
                <button class="add3Home" onclick="add3Home()">+3</button>
            </div>
        </div>
        <div>
            <h3>GUEST</h3>
            <div class="display-el">
                <span id="guest-score">0</span>
            </div>
            <div class="buttons">
                <button class="add1Guest" onclick="add1Guest()">+1</button>
                <button class="add2Guest" onclick="add2Guest()">+2</button>
                <button class="add3Guest" onclick="add3Guest()">+3</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
